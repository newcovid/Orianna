<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- 核心渐变：深邃的靛蓝到紫罗兰色 -->
        <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#3730a3" />
        </linearGradient>

        <!-- 主轨道渐变：亮天蓝平滑过渡到靛蓝 -->
        <linearGradient id="orbit-main-grad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0ea5e9" />
            <stop offset="50%" stop-color="#3b82f6" />
            <stop offset="100%" stop-color="#6366f1" />
        </linearGradient>

        <!-- 外围副轨渐变：清澈的天空蓝 -->
        <linearGradient id="orbit-sub-grad" x1="100%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="100%" stop-color="#818cf8" />
        </linearGradient>
    </defs>

    <!-- === 外围副轨 (代表观测与边界) === -->
    <!-- 半径 220, 周长 1382 -->
    <circle cx="256" cy="256" r="220" stroke="url(#orbit-sub-grad)" stroke-width="12"
        stroke-linecap="round" stroke-dasharray="450 933" transform="rotate(130 256 256)"
        opacity="0.9" />

    <!-- === 粗主轨 (形成字母 O 的轮廓与数据流) === -->
    <!-- 半径 150, 周长 942 -->
    <circle cx="256" cy="256" r="150" stroke="url(#orbit-main-grad)" stroke-width="40"
        stroke-linecap="round" stroke-dasharray="680 263" transform="rotate(-60 256 256)" />

    <!-- === 中心数据核心 (纯粹的魔偶意象) === -->
    <circle cx="256" cy="256" r="75" fill="url(#core-grad)" />
</svg>