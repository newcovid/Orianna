name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync version to package.json
        uses: jossef/action-set-json-field@v2
        with:
          file: package.json
          field: version
          value: ${{ steps.version.outputs.VERSION }}

      - name: Sync version to tauri.conf.json
        uses: jossef/action-set-json-field@v2
        with:
          file: src-tauri/tauri.conf.json
          field: version
          value: ${{ steps.version.outputs.VERSION }}

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Orianna ${{ github.ref_name }}'
          releaseBody: |
            ## Orianna ${{ github.ref_name }}

            英雄联盟对局数据分析工具。

            ### 下载说明
            - **Orianna_x.x.x_x64-setup.exe** — Windows 安装程序（推荐）
            - **Orianna_x.x.x_x64_en-US.msi** — Windows MSI 安装包
            - **Orianna_x.x.x_x64-portable.zip** — 便携版（解压即用，无需安装）

            > 首次运行时 Windows 可能弹出 SmartScreen 警告，点击"仍要运行"即可。
            > 便携版需要系统已安装 [WebView2 运行时](https://developer.microsoft.com/en-us/microsoft-edge/webview2/)（Windows 10/11 通常已自带）。
          releaseDraft: false
          prerelease: false

      - name: Create portable zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $dir = "Orianna-${version}-portable"
          New-Item -ItemType Directory -Path $dir
          Copy-Item "src-tauri/target/release/Orianna.exe" $dir/
          Get-ChildItem "src-tauri/target/release/*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination $dir/
          Compress-Archive -Path $dir -DestinationPath "${dir}.zip"

      - name: Upload portable zip to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "Orianna-${{ steps.version.outputs.VERSION }}-portable.zip"
